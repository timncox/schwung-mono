name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build ARM modules
        run: make arm

      - name: Verify release metadata
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          test "$(jq -r '.version' release.json)" = "$VERSION"
          test "$(jq -r '.download_url' release.json)" = "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_VERSION}/mono-module.tar.gz"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/mono-module.tar.gz
            build/mono-voice-module.tar.gz
